services:
  # Development service
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nuxt-app-dev
    image: nuxt-app:1.0.0
    volumes:
      - .:/app
      - /app/node_modules
      - .nuxt:/app/.nuxt
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=3000
    command: npm run dev
